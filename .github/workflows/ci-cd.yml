name: CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  DOTNET_VERSION: '10.0.x'
  NODE_VERSION: '22'
  REGISTRY: your-registry.azurecr.io
  API_IMAGE: mumbaitravelguru-api
  WEB_IMAGE: mumbaitravelguru-web

jobs:
  dotnet-ci:
    name: .NET – Restore, Build, Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore MumbaiTravelGuru.slnx

      - name: Build
        run: dotnet build MumbaiTravelGuru.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test MumbaiTravelGuru.slnx --configuration Release --no-build --verbosity normal

  web-ci:
    name: Web – Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: MumbaiTravelGuru.Client
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: MumbaiTravelGuru.Client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  docker-build-and-push:
    name: Build & Push Docker Images
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [dotnet-ci, web-ci]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.API_IMAGE }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.API_IMAGE }}:latest

      - name: Build & push Web image
        uses: docker/build-push-action@v6
        with:
          context: MumbaiTravelGuru.Client
          file: MumbaiTravelGuru.Client/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.WEB_IMAGE }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.WEB_IMAGE }}:latest
